<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="top">
      <header class="header">
        Jellyfish
        <nav class="header-nav">
          <ul class="nav-list">
            <li>
              <a href="#">Home</a>
            </li>
            <li>
              <a href="#">Log in</a>
            </li>
            <li>
              <a href="#">Sign up</a>
            </li>
          </ul>
        </nav>
      </header>
      <div class="headings">
        <section class="signup">
          <h1>Jellyfish are so cool</h3>
          <p class="subtext">
            Jellyfish have been drifting, floating and bobbing along in our ocean for over 
            500 million years - that's longer than dinosaurs, and a lot longer than us.

          </p>
          <button class="button-signup">Sign up</button>
        </section>
        <img class="top-image"
          src="images/pexels-tanya-gorelova-2199357-3934192.jpg"
          width="300"
          height="200"
        />
      </div>
    </div>
    <section class="middle">
      <h2>What do different Jellyfish look like?</h2>
      <div class="items">
      <figure class="item">
        <img src="https://images.pexels.com/photos/5506802/pexels-photo-5506802.jpeg" height="100px" width="auto">
        <figcaption>Sea Nettles <br>
          Credit: Brian Green</figcaption>
      </figure><figure class="item">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Aurelia_aurita_%28auge24eu%29.jpg/960px-Aurelia_aurita_%28auge24eu%29.jpg?_=20101124172432" height="100px" width="auto">
        <figcaption>Moon Jellyfish <br>
          Credit: Andreas Augstein / <a href="https://creativecommons.org/licenses/by/3.0/deed.en">CC-BY-SA-3.0</a></figcaption>
      </figure><figure class="item">
        <img src="https://images.pexels.com/photos/34999672/pexels-photo-34999672.jpeg" height="100px" width="auto">
        <figcaption>Lion's Maine <br>
          Credit: Derek Keats</figcaption>
      </figure><figure class="item">
        <img src="https://images.pexels.com/photos/11393887/pexels-photo-11393887.jpeg" height="100px" width="auto">
        <figcaption>Egg Yolk Jellyfish <br>
          Credit: Lazar Gugleta</figcaption>
      </figure>



      </div>
    </section>
  </body>
</html>
